<ion-content [fullscreen]="true" class="home-content">
  <div class="home-container">
    
    <div class="logo-section">
      <img src="assets/logo-agendapp-2.png" alt="AgendApp Logo" class="main-logo">
    </div>

    <div class="welcome-section">
      <h1 class="welcome-title">Bienvenido a AgendApp</h1>
      <p class="welcome-subtitle">Tu salud en un solo lugar</p>
    </div>

    <div class="action-section">
      <ion-button expand="block" (click)="irAlLogin()" class="start-button">
        Comenzar
      </ion-button>
    </div>

  </div>
</ion-content>
