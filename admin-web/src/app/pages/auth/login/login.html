<div class="login-container">

<div class="login-card">

    <h1>AgendApp</h1>
    <h3>Panel Administrativo</h3>

    <input
    type="email"
    placeholder="Correo Electrónico"
    [(ngModel)]="email">

    <input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password">

    <button (click)="login()">
        Iniciar Sesión
    </button>

</div>

</div>
