<app-sidebar></app-sidebar>

<div class="container">

<h1>Generar Horarios Médicos</h1>

<div class="formulario">

    <label>Médico</label>

    <select [(ngModel)]="medicoSeleccionado">

    <option value="">
        Seleccione un médico
    </option>

    <option
        *ngFor="let medico of medicos"
        [value]="medico.RUN_MED">

        {{ medico.NOMBRE_COMPLETO }}

    </option>

    </select>

    <div class="grid">

    <div>
        <label>Fecha</label>
        <input type="date" [(ngModel)]="fecha">
    </div>

    <div>
        <label>Duración</label>
        <select [(ngModel)]="duracion">
            <option [value]="10">10 minutos</option>
            <option [value]="15">15 minutos</option>
            <option [value]="20">20 minutos</option>
        </select>
    </div>

    <div>
        <label>Hora Inicio</label>
        <input type="time" [(ngModel)]="horaInicio">
    </div>

    <div>
        <label>Hora Fin</label>
        <input type="time" [(ngModel)]="horaFin">
    </div>

</div>

    <button (click)="generarHorarios()">
        Generar Horarios
    </button>

</div>

</div>
