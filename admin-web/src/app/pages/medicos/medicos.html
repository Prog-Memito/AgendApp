<app-sidebar></app-sidebar>

<div class="container">

    <h1>Profesionales</h1>
    <button class="btn-nuevo"
        (click)="mostrarFormulario = !mostrarFormulario">

        ➕ Nuevo Profesional

    </button>
    <table>
        <thead>
            <tr>
                <th>RUN</th>
                <th>Nombre Completo</th>
                <th>Profesión</th>
                <th>Fecha Nacimiento</th>
                <th>Sexo</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let medico of medicos">
                <td>{{ medico.RUN_MED }}</td>
                <td>
                    {{ medico.NOMBRE_COMPLETO }}
                </td>
                <td>
                    {{ medico.PROFESION }}
                </td>
                <td>
                    {{ medico.FECH_NAC | date:'dd/MM/yyyy' }}
                </td>
                <td>
                    {{ medico.SEXO }}
                </td>
                <td>
                    <span
                        [class.estado-activo]="medico.ESTADO === 'ACTIVO'"
                        [class.estado-inactivo]="medico.ESTADO !== 'ACTIVO'">

                        {{ medico.ESTADO }}

                    </span>
                </td>
                <td>
                    <input
                        type="checkbox"
                        [checked]="medico.ESTADO === 'ACTIVO'"
                        (change)="cambiarEstado(medico)">
                </td>
            </tr>
        </tbody>
    </table>

    <div *ngIf="mostrarFormulario" class="formulario-card">

    <h2>Nuevo Profesional</h2>

    <div class="grid-form">

        <input
            type="text"
            placeholder="12.345.678-K"
            maxlength="12"
            [(ngModel)]="nuevoRun"
            (input)="formatearRun($event)">

        <input
            type="text"
            placeholder="Nombre"
            [(ngModel)]="nuevoNombre">

        <input
            type="text"
            placeholder="Apellido Paterno"
            [(ngModel)]="nuevoApellidoPat">

        <input
            type="text"
            placeholder="Apellido Materno"
            [(ngModel)]="nuevoApellidoMat">

        <input
            type="date"
            [(ngModel)]="nuevoFechaNacimiento">

        <select [(ngModel)]="nuevaProfesion">

        <option value="">
            Seleccione una profesión
        </option>

        <option
            *ngFor="let p of profesiones"
            [value]="p.ID_PRO">

            {{ p.PROFESION }}

        </option>

        </select>
        
        <select
            [(ngModel)]="nuevoSexo">

            <option value="">
                Seleccionar
            </option>

            <option value="M">
                Masculino
            </option>

            <option value="F">
                Femenino
            </option>

        </select>

    </div>

    <button (click)="guardarMedico()">
        Guardar
    </button>

</div>
</div>
