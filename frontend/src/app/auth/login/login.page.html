<ion-content [fullscreen]="true" class="login-content">
  <div class="login-container">
    
    <div class="header-section">
      <img src="assets/logo-agendapp-2.png" alt="AgendApp" class="app-logo">
      <p class="app-subtitle">Sistema de Agendamiento Médico</p>
    </div>

    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title class="card-title">Iniciar Sesión</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <div class="input-group">
          <ion-label class="input-label">Correo Electrónico</ion-label>
          <div class="input-box">
            <ion-input 
              type="email" 
              placeholder="ejemplo@correo.cl"
              [(ngModel)]="emailValue">
            </ion-input>
          </div>
          <span class="input-helper">Ingresa el correo usado en tu registro</span>
        </div>

        <div class="input-group">
          <ion-label class="input-label">Contraseña</ion-label>
          <div class="input-box pass-box">
            <ion-input 
              [type]="passwordType" 
              placeholder="********"
              [(ngModel)]="passwordValue">
            </ion-input>
            <ion-button fill="clear" (click)="togglePassword()" class="eye-btn">
              <ion-icon slot="icon-only" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
            </ion-button>
          </div>
        </div>

        <ion-button expand="block" class="main-button" (click)="iniciarSesion()">
          Iniciar Sesión
        </ion-button>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" fill="outline" class="secondary-button" (click)="irAlRegistro()">
      Crear una Cuenta
    </ion-button>

  </div>
</ion-content>
