<ion-content [fullscreen]="true" class="register-content">
  <div class="register-container">
    
    <div class="header-section">
      <div class="icon-circle">
        <ion-icon name="person-add-outline"></ion-icon>
      </div>
      <h1 class="page-title">Crear Cuenta</h1>
      <p class="page-subtitle">Registro de nuevo paciente</p>
    </div>

    <ion-card class="register-card" *ngIf="paso === 1">
      <ion-card-header>
        <h2 class="step-indicator">Paso 1 de 2</h2>
      </ion-card-header>

      <ion-card-content>
        <div class="input-group">
          <ion-label class="input-label">RUT (Rol Único Tributario)</ion-label>
          <div class="input-box">
            <ion-input 
              type="text" 
              placeholder="12.345.678-9"
              [value]="rutValue"
              (ionInput)="onRutInput($event)"
              maxlength="12">
            </ion-input>
          </div>
        </div>

        <ion-button expand="block" class="main-green-button" (click)="siguientePaso()">
          Continuar
        </ion-button>
      </ion-card-content>
    </ion-card>

    <ion-card class="register-card" *ngIf="paso === 2">
      <ion-card-header>
        <h2 class="step-indicator">Paso 2 de 2</h2>
      </ion-card-header>

      <ion-card-content>
        <div class="info-box">
          <span class="info-label">RUN registrado:</span>
          <span class="info-value">{{ rutValue }}</span>
        </div>

        <div class="input-group">
          <ion-label class="input-label">Email</ion-label>
          <div class="input-box">
            <ion-input type="email" placeholder="tu@email.com" [(ngModel)]="emailValue"></ion-input>
          </div>
        </div>

        <div class="input-group">
          <ion-label class="input-label">Contraseña</ion-label>
          <div class="input-box password-field">
            <ion-input [type]="passwordType" placeholder="********" [(ngModel)]="passValue">
              <ion-button fill="clear" slot="end" (click)="togglePassword()" class="eye-button">
                <ion-icon slot="icon-only" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </ion-button>
            </ion-input>
          </div>
        </div>

        <div class="input-group">
          <ion-label class="input-label">Confirmar Contraseña</ion-label>
          <div class="input-box password-field">
            <ion-input [type]="passwordType" placeholder="********" [(ngModel)]="confirmPassValue">
              <ion-button fill="clear" slot="end" (click)="togglePassword()" class="eye-button">
                <ion-icon slot="icon-only" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </ion-button>
            </ion-input>
          </div>
        </div>

        <div class="buttons-row">
          <ion-button fill="clear" class="back-button" (click)="volverPaso()">Atrás</ion-button>
          <ion-button class="main-green-button" style="flex: 2; margin-top: 0;" (click)="registrarUsuario()">
            Registrarse
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" fill="outline" class="outline-green-button" (click)="irAlLogin()">
      Ya tengo cuenta
    </ion-button>

  </div>
</ion-content>
