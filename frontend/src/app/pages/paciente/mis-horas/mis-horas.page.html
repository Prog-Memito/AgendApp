<ion-header class="ion-no-border">
  <ion-toolbar mode="md">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/paciente-home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Horas Agendadas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="!cargando && horasPaciente.length === 0" class="empty-state-container">
    <div class="card-empty">
      <div class="icon-circle">
        <ion-icon name="calendar-outline"></ion-icon>
      </div>
      <h2>No tienes citas agendadas</h2>
      <p>Aún no has reservado ninguna hora médica</p>
    </div>
  </div>

  <div *ngIf="horasPaciente.length > 0">
    <ion-card *ngFor="let cita of horasPaciente">
      <ion-card-header>
        <ion-card-title>Dr. {{ cita.NOMBRE_MEDICO }}</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <p>
          <ion-icon name="calendar-outline"></ion-icon>
          {{ cita.FECHA }}
        </p>
        <p>
          <ion-icon name="time-outline"></ion-icon>
          {{ cita.HORA }}
        </p>
        <p>
          <ion-icon name="person-outline"></ion-icon>
          {{ cita.SERVICIO }}
        </p>
        <p>
          🏥 Box de atención: <strong>{{ cita.NUM_BOX }}</strong>
        </p>
        <div class="acciones-cita">
          <ion-button
            color="danger"
            fill="outline"
            (click)="cancelarReserva(cita)">
            Cancelar Reserva
          </ion-button>
          <ion-button
            *ngIf="puedeConfirmar(cita)"
            color="success"
            (click)="confirmarAsistencia(cita)">
            Confirmar Asistencia
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
